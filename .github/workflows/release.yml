name: build

# Builds InternetMerge for every supported target on each push, and publishes a
# GitHub Release with all artifacts on a v* tag.
#
# Per platform we ship:
#   macOS arm64   — signed + notarized .app (.zip)
#   Windows x64   — portable .zip, NSIS setup .exe, CLI .exe
#   Windows arm64 — portable .zip + setup .exe (best effort), CLI .exe
#   Linux x64     — GUI tarball
#   Linux arm64   — CLI tarball
#
# Version is injected from the tag via -ldflags into internal/version.Version.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  GOFLAGS: -buildvcs=false
  VERSION_PKG: github.com/kaandikec/internetmerge/internal/version.Version

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - name: Cross-compile core for all targets
        run: |
          for t in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            echo "building $t"
            GOOS=${t%/*} GOARCH=${t#*/} go build ./...
          done

  # ---- macOS arm64: signed + notarized GUI ----
  macos:
    needs: test
    runs-on: macos-14
    env:
      # Mirror the signing secret to a job-level var so step `if:` can gate on it
      # (steps can't read `secrets` directly in `if:`). Empty when not configured
      # → the app is ad-hoc self-signed and the sign/notarize steps skip.
      MACOS_CERT: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then V="${{ github.ref_name }}"; else V="dev"; fi
          echo "v=$V" >> "$GITHUB_OUTPUT"

      - name: Build (Wails)
        run: wails build -platform darwin/arm64 -s -clean -ldflags "-X ${VERSION_PKG}=${{ steps.ver.outputs.v }}" -o InternetMerge

      - name: Import Developer ID certificate
        if: env.MACOS_CERT != ''
        env:
          MACOS_CERT: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          MACOS_CERT_PW: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/app-signing.keychain-db"
          KCPW="$(uuidgen)"
          CERT="$RUNNER_TEMP/devid.p12"
          printf '%s' "$MACOS_CERT" | base64 --decode > "$CERT"
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          security import "$CERT" -k "$KC" -P "$MACOS_CERT_PW" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KC"
          security list-keychains -d user -s "$KC" "$HOME/Library/Keychains/login.keychain-db"
          echo "MACOS_KC=$KC" >> "$GITHUB_ENV"
          echo "MACOS_KCPW=$KCPW" >> "$GITHUB_ENV"

      - name: Sign, notarize, staple
        if: env.MACOS_CERT != ''
        env:
          MACOS_CERT: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          MACOS_IDENTITY: ${{ secrets.MACOS_DEVELOPER_IDENTITY }}
          NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          security unlock-keychain -p "$MACOS_KCPW" "$MACOS_KC"
          cat > "$RUNNER_TEMP/ent.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict/></plist>
          PLIST
          codesign --deep --force --options runtime --timestamp \
            --entitlements "$RUNNER_TEMP/ent.plist" \
            --sign "$MACOS_IDENTITY" build/bin/InternetMerge.app
          codesign --verify --deep --strict --verbose=2 build/bin/InternetMerge.app
          KEY="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$NOTARY_KEY" > "$KEY"
          ditto -c -k --keepParent build/bin/InternetMerge.app "$RUNNER_TEMP/notary.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notary.zip" \
            --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER" --wait
          xcrun stapler staple build/bin/InternetMerge.app

      - name: Package (.zip + drag-drop .dmg)
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist"
          # Keep the .zip (used by older clients / fallback).
          ditto -c -k --keepParent build/bin/InternetMerge.app "$GITHUB_WORKSPACE/dist/InternetMerge-macos-arm64.zip"
          # Build a drag-to-Applications .dmg.
          brew install create-dmg >/dev/null 2>&1 || brew install create-dmg
          STAGE="$RUNNER_TEMP/dmg"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          cp -R build/bin/InternetMerge.app "$STAGE/"
          create-dmg \
            --volname "InternetMerge" \
            --window-pos 200 120 --window-size 660 400 --icon-size 110 \
            --icon "InternetMerge.app" 165 175 \
            --app-drop-link 495 175 \
            --no-internet-enable \
            "$GITHUB_WORKSPACE/dist/InternetMerge-macos-arm64.dmg" \
            "$STAGE" || \
          create-dmg \
            --volname "InternetMerge" \
            "$GITHUB_WORKSPACE/dist/InternetMerge-macos-arm64.dmg" \
            "$STAGE"
      - name: Sign + notarize the DMG
        if: env.MACOS_CERT != ''
        env:
          MACOS_IDENTITY: ${{ secrets.MACOS_DEVELOPER_IDENTITY }}
          NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          DMG="$GITHUB_WORKSPACE/dist/InternetMerge-macos-arm64.dmg"
          security unlock-keychain -p "$MACOS_KCPW" "$MACOS_KC"
          codesign --force --timestamp --sign "$MACOS_IDENTITY" "$DMG"
          KEY="$RUNNER_TEMP/AuthKey.p8"; printf '%s' "$NOTARY_KEY" > "$KEY"
          xcrun notarytool submit "$DMG" --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER" --wait
          xcrun stapler staple "$DMG"
      - uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-macos-arm64
          path: dist/*

  # ---- Windows x64: portable + setup + CLI ----
  windows-amd64:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails + NSIS
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          choco install nsis -y --no-progress
          # choco doesn't refresh PATH for the current job; add NSIS explicitly.
          @("C:\Program Files (x86)\NSIS","C:\Program Files\NSIS") | Where-Object { Test-Path $_ } | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Build GUI (portable + NSIS setup) and CLI
        shell: pwsh
        run: |
          $v = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev" }
          $ld = "-X $env:VERSION_PKG=$v"
          wails build -platform windows/amd64 -s -clean -nsis -ldflags "$ld" -o InternetMerge.exe
          $dist = "$env:GITHUB_WORKSPACE/dist"; New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Compress-Archive -LiteralPath build/bin/InternetMerge.exe -DestinationPath "$dist/InternetMerge-windows-amd64-portable.zip" -Force
          $setup = Get-ChildItem build/bin -Filter *installer.exe -Recurse | Select-Object -First 1
          if ($setup) { Copy-Item $setup.FullName "$dist/InternetMerge-windows-amd64-setup.exe" } else { throw "NSIS installer not produced" }
          go build -trimpath -ldflags "$ld" -o "$dist/InternetMerge-windows-amd64-cli.exe" ./cmd/internetmerge
      - uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-windows-amd64
          path: dist/*

  # ---- Windows arm64: GUI best-effort + CLI guaranteed ----
  windows-arm64:
    needs: test
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails + NSIS
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          choco install nsis -y --no-progress
          @("C:\Program Files (x86)\NSIS","C:\Program Files\NSIS") | Where-Object { Test-Path $_ } | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Try GUI build (portable + setup)
        id: gui
        continue-on-error: true
        shell: pwsh
        run: |
          $v = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev" }
          $ld = "-X $env:VERSION_PKG=$v"
          wails build -platform windows/arm64 -s -clean -nsis -ldflags "$ld" -o InternetMerge.exe
          $dist = "$env:GITHUB_WORKSPACE/dist"; New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Compress-Archive -LiteralPath build/bin/InternetMerge.exe -DestinationPath "$dist/InternetMerge-windows-arm64-portable.zip" -Force
          $setup = Get-ChildItem build/bin -Filter *installer.exe -Recurse | Select-Object -First 1
          if ($setup) { Copy-Item $setup.FullName "$dist/InternetMerge-windows-arm64-setup.exe" }
      - name: Build CLI (always)
        shell: pwsh
        run: |
          $v = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev" }
          $ld = "-X $env:VERSION_PKG=$v"
          $dist = "$env:GITHUB_WORKSPACE/dist"; New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $env:GOARCH = "arm64"
          go build -trimpath -ldflags "$ld" -o "$dist/InternetMerge-windows-arm64-cli.exe" ./cmd/internetmerge
      - uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-windows-arm64
          path: dist/*

  # ---- Linux: x64 GUI + arm64 CLI ----
  linux:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install GUI deps
        run: |
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then V="${{ github.ref_name }}"; else V="dev"; fi
          echo "v=$V" >> "$GITHUB_OUTPUT"
      - name: Build x64 GUI
        run: |
          wails build -platform linux/amd64 -s -clean -tags webkit2_41 \
            -ldflags "-X ${VERSION_PKG}=${{ steps.ver.outputs.v }}" -o InternetMerge
          mkdir -p "$GITHUB_WORKSPACE/dist"
          tar czf "$GITHUB_WORKSPACE/dist/InternetMerge-linux-amd64.tar.gz" -C build/bin InternetMerge
      - name: Build arm64 CLI
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-X ${VERSION_PKG}=${{ steps.ver.outputs.v }}" -o InternetMerge ./cmd/internetmerge
          tar czf "$GITHUB_WORKSPACE/dist/InternetMerge-linux-arm64-cli.tar.gz" InternetMerge
      - uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-linux
          path: dist/*

  # ---- CLI: relay-capable binary for every OS/arch ----
  cli:
    needs: test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: darwin,  goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then V="${{ github.ref_name }}"; else V="dev"; fi
          echo "v=$V" >> "$GITHUB_OUTPUT"
      - name: Build CLI
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          go build -trimpath \
            -ldflags "-s -w -X ${VERSION_PKG}=${{ steps.ver.outputs.v }}" \
            -o "$GITHUB_WORKSPACE/dist/internetmerge-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/internetmerge
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # ---- Docker: multi-arch relay image to GHCR ----
  docker:
    needs: test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then V="${{ github.ref_name }}"; else V="dev"; fi
          echo "v=$V" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dikeckaan/internetmerge
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: VERSION=${{ steps.ver.outputs.v }}

  # ---- Single release job: gather all artifacts, attach once ----
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows-amd64, windows-arm64, linux, cli]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
