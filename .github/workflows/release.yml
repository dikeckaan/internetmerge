name: build

# Builds InternetMerge for all supported platforms on every push, and attaches
# the artifacts to a GitHub Release when a v* tag is pushed.
#
# Wails GUI apps need CGO and cannot be reliably cross-compiled, so every GUI
# target is built on its own native runner.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  # The windows-11-arm runner's git tripped Go's build-time VCS stamping
  # ("error obtaining VCS status"); disabling it is harmless and consistent.
  GOFLAGS: -buildvcs=false

jobs:
  # Fast sanity gate: unit tests + cross-compile of the core for every target.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - name: Cross-compile core for all targets
        run: |
          for t in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            echo "building $t"
            GOOS=${t%/*} GOARCH=${t#*/} go build ./...
          done

  # Native GUI builds (the targets that have GitHub-hosted runners).
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            platform: darwin/arm64
          - name: macos-intel
            os: macos-13
            platform: darwin/amd64
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
          - name: windows-arm64
            os: windows-11-arm
            platform: windows/arm64
          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux/amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux GUI dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Wails v2.12 dropped webkit2gtk-4.0; the 4.1 dev package lives in the
          # universe component on ubuntu-22.04.
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Select full Xcode (macOS)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install Wails
        shell: bash
        # Pin to the version in go.mod; @latest pulled inconsistent CLI versions
        # across matrix jobs.
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (Wails)
        shell: bash
        # -s skips the frontend build: our frontend is pre-built static files in
        # frontend/dist, and re-bundling them triggered esbuild CSS-parse errors
        # ("Unexpected token Function") on the Linux/Windows runners.
        # On Linux, Wails v2.12 needs the webkit2_41 build tag (4.0 is dropped).
        run: |
          TAGS=""
          if [ "${{ runner.os }}" = "Linux" ]; then TAGS="-tags webkit2_41"; fi
          wails build -platform ${{ matrix.platform }} -s -clean $TAGS -o InternetMerge

      - name: Package artifact
        shell: bash
        # Absolute archive destination — relative "../../dist" after cd build/bin
        # was fragile on the Windows runner.
        run: |
          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"
          cd build/bin
          if [ "${{ runner.os }}" = "macOS" ]; then
            zip -r -y "$DIST/InternetMerge-${{ matrix.name }}.zip" InternetMerge.app
          elif [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$DIST/InternetMerge-${{ matrix.name }}.zip" InternetMerge.exe
          else
            tar czf "$DIST/InternetMerge-${{ matrix.name }}.tar.gz" InternetMerge
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-${{ matrix.name }}
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # linux/arm64 ships as a headless CLI: the only GitHub-hosted arm64 Linux
  # runner (ubuntu-24.04-arm) cannot install webkit2gtk for the Wails GUI, so we
  # cross-compile the CGO-free CLI on x64 instead.
  linux-arm64-cli:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cross-compile CLI for linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build -o InternetMerge ./cmd/internetmerge
      - name: Package artifact
        run: |
          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"
          tar czf "$DIST/InternetMerge-linux-arm64-cli.tar.gz" InternetMerge
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-linux-arm64-cli
          path: dist/*
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
