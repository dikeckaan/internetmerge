name: build

# Builds InternetMerge for all supported platforms on every push, and attaches
# the artifacts to a GitHub Release when a v* tag is pushed.
#
# Wails GUI apps need CGO and cannot be reliably cross-compiled, so every GUI
# target is built on its own native runner. arm64 Windows/Linux have no working
# hosted GUI toolchain, so they ship as the headless CGO-free CLI.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  # windows runners tripped Go's build-time VCS stamping; disabling is harmless.
  GOFLAGS: -buildvcs=false

jobs:
  # Fast sanity gate: unit tests + cross-compile of the core for every target.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - name: Cross-compile core for all targets
        run: |
          for t in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            echo "building $t"
            GOOS=${t%/*} GOARCH=${t#*/} go build ./...
          done

  # Native GUI builds.
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            platform: darwin/arm64
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux/amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux GUI dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Wails v2.12 dropped webkit2gtk-4.0; the 4.1 dev package lives in the
          # universe component on ubuntu-22.04.
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Select full Xcode (macOS)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (Wails)
        shell: bash
        # -s skips the frontend build (frontend/dist is pre-built static; letting
        # Wails re-bundle triggered esbuild CSS-parse errors). On Linux, Wails
        # v2.12 needs the webkit2_41 build tag. On Windows the output name must
        # carry the .exe extension or packaging can't find it.
        run: |
          TAGS=""
          OUT="InternetMerge"
          if [ "${{ runner.os }}" = "Linux" ]; then TAGS="-tags webkit2_41"; fi
          if [ "${{ runner.os }}" = "Windows" ]; then OUT="InternetMerge.exe"; fi
          wails build -platform ${{ matrix.platform }} -s -clean $TAGS -o "$OUT"

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"
          cd build/bin
          if [ "${{ runner.os }}" = "macOS" ]; then
            zip -r -y "$DIST/InternetMerge-${{ matrix.name }}.zip" InternetMerge.app
          else
            tar czf "$DIST/InternetMerge-${{ matrix.name }}.tar.gz" InternetMerge
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "$env:GITHUB_WORKSPACE/dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Get-ChildItem -Recurse build/bin
          $exe = Get-ChildItem -Path build/bin -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "no .exe found under build/bin" }
          $zip = Join-Path $dist "InternetMerge-${{ matrix.name }}.zip"
          Compress-Archive -LiteralPath $exe.FullName -DestinationPath $zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-${{ matrix.name }}
          path: dist/*

  # arm64 builds: no working hosted GUI toolchain (no Linux arm64 webkit; Windows
  # arm64 has no cgo cross-toolchain), so ship the CGO-free headless CLI built on
  # an x64 runner.
  arm64-cli:
    needs: test
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64-cli
            goos: linux
            ext: ""
          - name: windows-arm64-cli
            goos: windows
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cross-compile CLI for ${{ matrix.goos }}/arm64
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build -o "InternetMerge${{ matrix.ext }}" ./cmd/internetmerge
      - name: Package artifact
        run: |
          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"
          tar czf "$DIST/InternetMerge-${{ matrix.name }}.tar.gz" "InternetMerge${{ matrix.ext }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InternetMerge-${{ matrix.name }}
          path: dist/*

  # Single release job: gather every build's artifact and attach them in one
  # shot. Doing this per-build raced (concurrent gh-release create/update) and
  # dropped an asset; one job avoids that entirely.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, arm64-cli]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
